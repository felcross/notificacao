<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; margin: 0; padding: 0; }
        .wrapper { padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header { background-color: #2c3e50; color: #ffffff; padding: 30px; text-align: center; }
        .content { padding: 30px; color: #444; line-height: 1.6; }
        .order-info { background: #f1f3f5; padding: 15px; border-radius: 5px; margin: 20px 0; border-left: 4px solid #27ae60; }
        .footer { text-align: center; padding: 20px; font-size: 12px; color: #95a5a6; }
        .btn { display: inline-block; padding: 12px 25px; background-color: #27ae60; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="container">
        <div class="header">
            <h1 style="margin:0;">Pedido Confirmado!</h1>
        </div>
        <div class="content">
            <p>Olá, <strong th:text="${nomeUsuario}">Cliente</strong>,</p>
            <p th:text="${mensagemCorpo}">Sua compra foi realizada com sucesso.</p>

            <div class="order-info">
                <p style="margin: 5px 0;"><strong>ID do Pedido:</strong> <span th:text="${idVenda}">#000</span></p>
                <p style="margin: 5px 0;"><strong>Valor Total:</strong> R$ <span th:text="${valorTotal}">0,00</span></p>
                <p style="margin: 5px 0;"><strong>Data:</strong> <span th:text="${dataVenda}">--/--/--</span></p>
            </div>

            <p>Estamos preparando tudo para o envio. Você receberá novas atualizações em breve.</p>
            <center><a href="#" class="btn">Acompanhar meu Pedido</a></center>
        </div>
        <div class="footer">
            <p>&copy; 2026 FCross Microservices. Todos os direitos reservados.</p>
        </div>
    </div>
</div>
</body>
</html>
